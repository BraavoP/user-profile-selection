<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
      <h1>Quem está assistindo?</h1>
      <button id="theme-toggle" aria-label="Alternar modo claro/escuro" class="theme-toggle" aria-pressed="false">
         <span class="toggle-ball"></span>
      </button>
   </header>
   <main>


      <!-- Perfis de usuários -->
      
      <section aria-label="Seleção de perfis">
         <ul class="profiles" aria-label="Perfis de usuário" role="list">

            <!-- Perfil 1 -->
            <li class="profile" role="button" tabindex="0" aria-label="Perfil 1" onclick="localStorage.setItem('perfilAtivoNome', 'Elisía'); localStorage.setItem('perfilAtivoImagem', '../Assets/Perfil-1.png'); window.location.href='catalogo/catalogo.html'">
               <figure>
                  <img src="Assets/perfil-1.png" alt="Imagem em desenho de uma personagem fictícia inspirada em princesas de gelo">
                  <figcaption>Elisía</figcaption>
               </figure>
            </li>
             <!-- Perfil 2 -->

            <li class="profile" role="button" tabindex="0" aria-label="Perfil 2" onclick="localStorage.setItem('perfilAtivoNome', 'Ariele'); localStorage.setItem('perfilAtivoImagem', '../Assets/Perfil-2.png'); window.location.href='catalogo/catalogo.html'">
               <figure>
                  <img src="Assets/perfil-2.png" alt="Imagem em desenho de uma personagem fictícia inspirada em princesas do mar">
                  <figcaption>Ariele</figcaption>
               </figure>
            </li>

             <!-- Perfil 3 -->
            <li class="profile" role="button" tabindex="0" aria-label="Perfil 3" onclick="localStorage.setItem('perfilAtivoNome', 'Bonita'); localStorage.setItem('perfilAtivoImagem', '../Assets/Perfil-3.png'); window.location.href='catalogo/catalogo.html'">
               <figure>
                  <img src="Assets/perfil-3.png" alt="Imagem em desenho de uma personagem fictícia inspirada em princesas bonita">
                  <figcaption>Bonita</figcaption>
               </figure>
            </li>
             <!-- Perfil 4 -->
            <li class="profile" role="button" tabindex="0" aria-label="Perfil 4" onclick="localStorage.setItem('perfilAtivoNome', 'Mulana'); localStorage.setItem('perfilAtivoImagem', '../Assets/Perfil-4.png'); window.location.href='catalogo/catalogo.html'">
               <figure>
                  <img src="Assets/perfil-4.png" alt="Imagem em desenho de uma personagem fictícia inspirada em princesas do asiática">
                  <figcaption>Mulana</figcaption>
               </figure>
            </li>

         </ul>
      </section>
   </main>

   <script src="theme.js"></script>
</body>
</html>
